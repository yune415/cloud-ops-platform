version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: cloud-ops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html
    restart: always

  mysql:
    image: mysql:8.0
    container_name: cloud-ops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: CloudOps2026!
      MYSQL_DATABASE: cloudops
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
